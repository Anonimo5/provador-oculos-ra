<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual de Óculos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">A iniciar o provador...</div>
        <video id="webcam" autoplay playsinline></video>
        <div id="three-container"></div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const threeContainer = document.getElementById('three-container');
        const loadingElement = document.getElementById('loading');

        let scene, camera, renderer, glassesGroup;
        let faceMesh;

        // 1. Configuração do Cenário 3D
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            threeContainer.appendChild(renderer.domElement);

            glassesGroup = new THREE.Group();
            scene.add(glassesGroup);

            // Carregar o modelo 3D
            const loader = new THREE.GLTFLoader();
            loader.load('oculos.glb', function (gltf) {
                const model = gltf.scene;
                
                // FORÇA O ALINHAMENTO DO CENTRO DO ÓCULOS
                const box = new THREE.Box3().setFromObject(model);
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.sub(center); 
                
                // MEDE E CLASSIFICA O TAMANHO REAL DO ARQUIVO
                const size = new THREE.Vector3();
                box.getSize(size);
                
                // Normaliza o óculos para ter exatamente 1 unidade de largura (eixo X)
                const scale = 1.0 / size.x;
                model.scale.set(scale, scale, scale);
                
                glassesGroup.add(model);
                
                if (loadingElement) loadingElement.style.display = 'none';
                console.log("Óculos recalibrado com sucesso.");
            }, undefined, function (error) {
                console.error("Erro ao ler o ficheiro oculos.glb:", error);
            });

            // Iluminação
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
            mainLight.position.set(0, 4, 4);
            scene.add(mainLight);

            camera.position.z = 2;
        }

        // 2. Cálculo Estrito de Posicionamento e Alinhamento Realista
        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                glassesGroup.visible = false;
                return;
            }

            glassesGroup.visible = true;
            const landmarks = results.multiFaceLandmarks[0];

            // Ponto 168 é o osso estável do nariz (ponte/glabela)
            const noseBridge = landmarks[168]; 
            const leftEye = landmarks[33];     
            const rightEye = landmarks[263];    

            // Transposição milimétrica para o plano tridimensional
            const posX = -(noseBridge.x - 0.5) * 1.5;
            const posY = -(noseBridge.y - 0.5) * 1.5; 
            const posZ = -noseBridge.z * 2.0; 

            glassesGroup.position.set(posX, posY, posZ);

            // ESCALA REALISTA: Baseada na distância exata entre os olhos
            const eyeWidth = Math.sqrt(
                Math.pow(rightEye.x - leftEye.x, 2) + 
                Math.pow(rightEye.y - leftEye.y, 2)
            );
            
            // Fator calibrado baseado na normalização por largura (size.x). 
            // Multiplicador entre 1.1 e 1.35 garante a proporção humana real na face.
            const scaleFactor = eyeWidth * 1.25; 
            glassesGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // ROTAÇÃO CORRIGIDA E TRAVADA:
            // Alinha de forma reta horizontalmente usando o ângulo dos olhos
            const angle = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
            glassesGroup.rotation.z = angle; 
            
            // Corrige a rotação Y para manter as lentes olhando para frente, apontando hastes para trás
            glassesGroup.rotation.y = -(rightEye.z - leftEye.z) * 2;
            
            // FORÇA MANUAL DA ROTAÇÃO BASE DO MODELO:
            // Zera qualquer desvio para garantir que fique reto
            glassesGroup.rotation.x = 0; 

            renderer.render(scene, camera);
        }

        // 3. Inicialização do FaceMesh
        function initMediaPipe() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            faceMesh.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            
            cameraUtils.start();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        initMediaPipe();
    </script>
</body>
</html>
