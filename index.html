<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual de Óculos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">A iniciar o provador...</div>
        <video id="webcam" autoplay playsinline></video>
        <div id="three-container"></div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const threeContainer = document.getElementById('three-container');
        const loadingElement = document.getElementById('loading');

        let scene, camera, renderer, glassesGroup, glassesModel;
        let faceMesh;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            threeContainer.appendChild(renderer.domElement);

            glassesGroup = new THREE.Group();
            scene.add(glassesGroup);

            const loader = new THREE.GLTFLoader();
            loader.load('oculos.glb', function (gltf) {
                glassesModel = gltf.scene;
                
                // Força o ponto central geométrico (pivô) no centro perfeito do arquivo 3D
                const box = new THREE.Box3().setFromObject(glassesModel);
                const center = new THREE.Vector3();
                box.getCenter(center);
                glassesModel.position.sub(center); 
                
                // Normaliza o tamanho com base na largura frontal do óculos (eixo X)
                const size = new THREE.Vector3();
                box.getSize(size);
                const scale = 1.0 / size.x; 
                glassesModel.scale.set(scale, scale, scale);
                
                glassesGroup.add(glassesModel);
                
                if (loadingElement) loadingElement.style.display = 'none';
                console.log("Óculos carregado e normalizado.");
            }, undefined, function (error) {
                console.error("Erro ao carregar oculos.glb:", error);
            });

            // Luzes para dar reflexo e brilho realista no óculos do Vectary
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(0, 4, 4);
            scene.add(mainLight);

            camera.position.z = 2;
        }

        // 2. Rastreamento Avançado usando o eixo dos Olhos/Pupilas
        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0 || !glassesModel) {
                glassesGroup.visible = false;
                return;
            }

            glassesGroup.visible = true;
            const landmarks = results.multiFaceLandmarks[0];

            // Rastreamento estrito dos centros dos olhos (marcadores estáveis equivalentes às pupilas)
            const leftEyeCenter = landmarks[468];  
            const rightEyeCenter = landmarks[473]; 
            const noseBridge = landmarks[168];

            // 1. CALCULA O CENTRO PERFEITO ENTRE OS DOIS OLHOS
            const midX = (leftEyeCenter.x + rightEyeCenter.x) / 2;
            const midY = (leftEyeCenter.y + rightEyeCenter.y) / 2;
            const midZ = (leftEyeCenter.z + rightEyeCenter.z) / 2;

            // Transpõe os dados de rastreamento para o espaço 3D
            const posX = -(midX - 0.5) * 1.5;
            
            // Usamos a altura média dos olhos e adicionamos uma leve compensação (-0.02) 
            // para o óculos descer milimetricamente e assentar no osso do nariz
            const posY = -(midY - 0.5) * 1.5 - 0.02; 
            
            const posZ = -midZ * 2.0; 

            glassesGroup.position.set(posX, posY, posZ);

            // 2. ESCALA DINÂMICA (Largura proporcional à distância entre as pupilas)
            const pupilDistance = Math.sqrt(
                Math.pow(rightEyeCenter.x - leftEyeCenter.x, 2) + 
                Math.pow(rightEyeCenter.y - leftEyeCenter.y, 2)
            );
            
            // Multiplicador exato para cobrir a face de ponta a ponta sem ficar gigante
            const scaleFactor = pupilDistance * 2.1; 
            glassesGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // 3. ROTAÇÃO TRAVADA DE FRENTE
            // Calcula a inclinação lateral da cabeça com base na linha dos olhos
            const angle = Math.atan2(rightEyeCenter.y - leftEyeCenter.y, rightEyeCenter.x - leftEyeCenter.x);
            
            // Garante que o óculos não incline para frente ou vire de lado incorretamente
            glassesGroup.rotation.x = 0.0;
            glassesGroup.rotation.y = 0.0;
            glassesGroup.rotation.z = angle; 

            // ALINHAMENTO DO ARQUIVO DO VECTARY
            // Se o óculos persistir em carregar de lado devido à exportação original,
            // altere o valor abaixo de "0.0" para "Math.PI / 2" para girá-lo de frente.
            glassesModel.rotation.y = 0.0; 
            glassesModel.rotation.x = 0.0;
            glassesModel.rotation.z = 0.0;

            renderer.render(scene, camera);
        }

        function initMediaPipe() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true, // Ativa explicitamente os pontos detalhados das pupilas (468 a 477)
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            faceMesh.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            
            cameraUtils.start();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        initMediaPipe();
    </script>
</body>
</html>
