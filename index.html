<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador de Óculos RA - Realístico</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; z-index: 10; font-family: sans-serif; }
    </style>

    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- NOVO: Adicionado o importador de arquivos GLTF/GLB -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">Carregando óculos 3D e câmera...</div>
    <div id="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="three-container"></div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const loadingElement = document.getElementById('loading');
        const threeContainer = document.getElementById('three-container');

        let scene, camera, renderer, glassesGroup;
        let faceMesh;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            threeContainer.appendChild(renderer.domElement);

            // Criamos um grupo vazio onde o óculos importado vai ficar dentro
            glassesGroup = new THREE.Group();
            scene.add(glassesGroup);

            // Importando o modelo 3D real
            const loader = new THREE.GLTFLoader();
            // Substitua 'oculos.glb' pelo nome exato do arquivo que você colocar no seu GitHub
            loader.load('oculos.glb', function (gltf) {
                const model = gltf.scene;
                
                // Ajustes de pivô e rotação padrão do arquivo (pode variar dependendo de como o modelo foi desenhado)
                model.position.set(0, 0, 0); 
                
                glassesGroup.add(model);
                if (loadingElement) loadingElement.style.display = 'none';
            }, undefined, function (error) {
                console.error("Erro ao carregar o óculos 3D:", error);
            });

            // Luzes mais fortes para dar realismo ao material do óculos (metal, reflexos, etc.)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 5, 5);
            scene.add(dirLight);

            camera.position.z = 2;
        }

        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                const noseBridge = landmarks[168]; // Ponte do nariz
                const leftEye = landmarks[33];
                const rightEye = landmarks[263];

                const x = -(noseBridge.x - 0.5) * 2; 
                const y = -(noseBridge.y - 0.5) * 1.5; 
                const z = -noseBridge.z * 2; 

                // Move o grupo do óculos inteiro
                glassesGroup.position.set(x, y, z);

                // Rotação Z (inclinação lateral da cabeça)
                const roll = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
                glassesGroup.rotation.z = -roll;

                // ESCALA DINÂMICA: Ajuste o multiplicador final (ex: 3.5) até que o óculos encaixe perfeitamente no seu rosto
                const eyeWidth = Math.sqrt(Math.pow(rightEye.x - leftEye.x, 2) + Math.pow(rightEye.y - leftEye.y, 2));
                const scaleFactor = eyeWidth * 3.5; 
                glassesGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                glassesGroup.visible = true;
            } else {
                glassesGroup.visible = false;
            }

            renderer.render(scene, camera);
        }

        function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({ image: videoElement }); },
                width: 640,
                height: 480
            });
            cameraUtils.start();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        initFaceMesh();
    </script>
</body>
</html>
